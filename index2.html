    <style>
        :root { --rojo: #8B0000; --dorado: #FFD700; --oscuro: #1a1a1a; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f8f9fa; scroll-behavior: smooth; }
        h1, h2, h4, .navbar-brand { font-family: 'Playfair Display', serif; }
        
        .navbar { background-color: var(--rojo); border-bottom: 3px solid var(--dorado); padding: 1rem 0; }
        .menu-card { border: none; border-radius: 15px; transition: 0.3s; height: 100%; background: white; }
        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .menu-card img { height: 150px; object-fit: cover; border-radius: 15px 15px 0 0; }
        
        .comanda-fixed { position: sticky; top: 100px; z-index: 10; }
        .list-group-item { display: flex; justify-content: space-between; align-items: center; border: none; padding: 0.5rem 0; }
        
        #ticketImprimible { font-family: 'Courier New', Courier, monospace; background: white; color: black; }
        
        @media print {
            body * { visibility: hidden; }
            #ticketImprimible, #ticketImprimible * { visibility: visible; }
            #ticketImprimible { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>

                        </div>
                        <div class="card-body p-4">
                            <div class="mb-4">
                                <label class="form-label fw-bold" id="txt-label-mesa">Número de Mesa:</label>

                            </div>

                            </button>
                        </div>

                </div>
            </div>

    </main>

        let currentLang = 'es';
        let carrito = [];

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            translations[currentLang].items.forEach(item => {
                container.innerHTML += `
                    <div class="col-md-6 col-xl-3">
                        <div class="card menu-card shadow-sm">
                            <img src="${item.img}">
                            <div class="card-body text-center d-flex flex-column justify-content-between">
                                <h6 class="fw-bold text-dark mb-1">${item.n}</h6>
                                <p class="h6 text-danger fw-bold">$${item.p.toFixed(2)}</p>
                                <button class="btn btn-dark btn-sm rounded-pill" onclick="agregarItem('${item.n}', ${item.p})">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
            updateLabels();
        }

        function updateLabels() {
            const lang = translations[currentLang];
            document.getElementById('txt-menu-title').innerText = lang.menuTitle;
            document.getElementById('txt-comanda-header').innerText = lang.comandaHeader;
            document.getElementById('txt-label-mesa').innerText = lang.labelMesa;
            document.getElementById('txt-total-label').innerText = lang.totalLabel;
            document.getElementById('txt-btn-ticket').innerText = lang.btnTicket;
        }

        window.agregarItem = (n, p) => {
            carrito.push({ n, p });
            renderCarrito();
        };

        window.eliminarItem = (index) => {
            carrito.splice(index, 1);
            renderCarrito();
        };

        function renderCarrito() {
            const lista = document.getElementById('listaPedido');
            const totalDisplay = document.getElementById('totalPedido');
            const btn = document.getElementById('btnGenerarTicket');
            lista.innerHTML = '';
            let total = 0;

            if (carrito.length === 0) {
                lista.innerHTML = '<li class="list-group-item text-muted small text-center">...</li>';
                totalDisplay.innerText = '$0.00';
                btn.disabled = true;
                return;
            }

            carrito.forEach((item, i) => {
                total += item.p;
                lista.innerHTML += `
                    <li class="list-group-item">
                        <span class="small">${item.n}</span>
                        <div>
                            <span class="small fw-bold">$${item.p.toFixed(2)}</span>
                            <i class="bi bi-dash-circle text-danger ms-2" style="cursor:pointer" onclick="eliminarItem(${i})"></i>
                        </div>
                    </li>`;
            });
            totalDisplay.innerText = `$${total.toFixed(2)}`;
            btn.disabled = false;
        }

        document.getElementById('languageSelect').addEventListener('change', (e) => {
            currentLang = e.target.value;
            // Nota: El carrito mantiene los nombres en el idioma que fueron agregados
            // para evitar errores de referencia, pero la interfaz general cambia.
            renderMenu();
        });

        document.getElementById('btnGenerarTicket').addEventListener('click', () => {
            const mesa = document.getElementById('numMesa').value || "??";
            const lang = translations[currentLang];
            
            document.getElementById('ticket-mesa-display').innerText = lang.ticketMesa + mesa;
            document.getElementById('txt-gracias-ticket').innerText = lang.gracias;
            
            const tItems = document.getElementById('tItems');
            tItems.innerHTML = '';
            let finalTotal = 0;
            
            carrito.forEach(item => {
                finalTotal += item.p;
                tItems.innerHTML += `<div class="d-flex justify-content-between"><span>${item.n}</span><span>$${item.p.toFixed(2)}</span></div>`;
            });
            
            document.getElementById('ticket-total-display').innerText = lang.totalLabel + " $" + finalTotal.toFixed(2);
            new bootstrap.Modal(document.getElementById('ticketModal')).show();
        });

        renderMenu();
        renderCarrito();
    </script>
</body>
</html>
